# Lazygit keybindings for the Karabiner-Elements o24 layout.
# Keys are the logical characters received after Karabiner remapping, not
# positions on a QWERTY keyboard. See README.md and docs/o24-keybindings.md.
keybinding:
  universal:
    prevItem-alt: n
    nextItem-alt: t
    prevBlock-alt: k
    nextBlock-alt: s
    goInto: [h, <enter>]
    confirmMenu: [h, <enter>]

    # These defaults conflict with the o24 navigation keys above.
    nextMatch: <alt+n>
    new: <alt+n>

  status:
    recentRepos: [h, <enter>]

  files:
    stashAllChanges: <alt+s>

  branches:
    sortOrder: <alt+s>

  commits:
    squashDown: <alt+s>
    revertCommit: <alt+t>

  main:
    prevHunk: [<left>, k]
    nextHunk: [<right>, s]
